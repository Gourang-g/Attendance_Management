<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sidebar{
            width:260px;
            min-height:100vh;
            background:#1565c0;
            color:white;
            padding:20px;
            box-sizing:border-box;
        }
        #studentWelcome{
            font-size:20px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="sidebar">
    <h1 id = "studentWelcome">Student Dashboard</h1>

    <button onclick="viewMyAttendance()">My Attendance</button>
    <button onclick="viewMyReport()">My Full Report</button>
    <button onclick="viewSubjectReport()">Subject Wise Report</button>
    <button onclick="initializeGeolocationCheckin()">Mark Attendance (Location)</button>
    <button onclick="logout()">Logout</button>

    </div>
    <div class="main-content">
        <div id="dashboard" class="dashboard"></div>
        <div id = "content"></div>
    </div>
</div>

<script src="js/student.js"></script>
</body>
</html>
