<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Management</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="container">
    <h1>Department Management</h1>

    <div class="card">
        <h2>Add Department</h2>

        <input type="text" id="departmentName" placeholder="Department Name (e.g. Computer Science)" />
        <button onclick="addDepartment()">Add Department</button>
    </div>

    <div class="card">
        <h2>All Departments</h2>
        <table border="1" width="100%" cellpadding="10">
            <thead>
            <tr>
                <th>ID</th>
                <th>Department Name</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="departmentTableBody"></tbody>
        </table>
    </div>

    <button onclick="window.location.href='admin-dashboard.html'">
        Back to Dashboard
    </button>
</div>

<script src="admin.js"></script>
<script>
    window.onload = loadDepartments;
</script>
</body>
</html>
