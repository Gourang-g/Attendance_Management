<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management Login</title>
    <!-- <link rel="stylesheet" href="css/style.css">
    -->
    <style>
        body{
            background: linear-gradient(90deg, #efd5ff 0%, #515ada 100%);
            font-family: Arial, sans-serif;
            /*background: linear-gradient(to right, #d9e4f5, #f7f9fc);

            background: linear-gradient(135deg,#0a2540,#134e8c);
*/
            /*            background: linear-gradient(135deg, #0a2540, #1565c0);

                        background: linear-gradient(
                                135deg,
                                #667eea,
                                #764ba2
                        );


                        background: linear-gradient(
                                135deg,
                                #0a2540,
                                #134e8c,
                                #1976d2
                        );*/
            margin:0;

            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .login-container, .dashboard-container{

            background:#ffffff;
            padding:30px;
            width:700px;
            border-radius:12px;
            /*box-shadow:0 10 30px rgba(0,0,0,0.15);*/
            text-align:center;
        }
        /*
                h1{
                    margin-bottom:20px;
                    color:#2c3e50;
                }
        */
        h1{
            font-size:36px;
            color:#0f4c81;
            margin-bottom:30px;
            font-weight:700;
        }
        h3{
            color:#34495e;
            margin-top:20px;
        }

        select,input,button{
            width:90%;
            margin:10px 0;
            padding:12px;
            font-size:15px;
            border-radius:6px;
        }

        input,select{
            border:1px solid #ccc;
            border-color:#1565c0;
        }

        button{
            background:#3498db;
            color:white;
            border:none;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            background:#2980b9;
        }

        #message{
            margin-top:10px;
            color:red;
        }


    </style>
</head>
<body>

<div class="login-container">
    <h1>Attendance Management System</h1>

    <select id="role">
        <option value="admin">Admin</option>
        <option value="teacher">Teacher</option>
        <option value="student">Student</option>
    </select>

    <input type="text" id="username" placeholder="Enter Username / RollNo">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="loginUser()">Login</button>
    <p style="margin-top:15px;">
        New Student? <a href="register.html">Register Here</a>
    </p>

    <p id="message"></p>
</div>

<script src="js/login.js"></script>
</body>
</html>
