services:
  - type: web
    name: attendance-backend
    runtime: image
    plan: free
    image:
      url: eclipse-temurin:21-jdk-alpine
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/Attendance-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
            name: attendance-db
            property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
            name: attendance-db
            property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
            name: attendance-db
            property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_JWT_SECRET
        value: mysecretkey1234567890123456789012345678901234567890
      - key: SERVER_PORT
        value: "3000"
databases:
  - name: attendance-db
    databaseName: attendance_db
    region: singapore